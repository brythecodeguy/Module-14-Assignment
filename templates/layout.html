<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Calculations Application{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>

<body class="font-[Inter] bg-slate-50 text-gray-800">

<!-- NAVBAR -->
<header class="sticky top-0 z-50 backdrop-blur-md bg-white/80 border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

        <!-- Logo / Title -->
        <div class="flex items-center gap-2">
            <span class="text-2xl font-bold tracking-tight text-gray-800">
                Calculations
            </span>
            <span class="text-emerald-600 text-xl">●</span>
        </div>

        <!-- Navigation -->
        <nav class="flex items-center gap-6 text-sm font-medium">
            <a href="{{ url_for('index') }}" 
               class="text-gray-600 hover:text-emerald-700 transition">
               Home
            </a>

            <a href="{{ url_for('login_page') }}" 
               class="text-gray-600 hover:text-emerald-700 transition">
               Login
            </a>

            <a href="{{ url_for('register_page') }}" 
               class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700 transition shadow-sm">
               Register
            </a>
        </nav>
    </div>
</header>

<!-- MAIN CONTENT -->
<main>
    {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="mt-10 border-t border-gray-200 bg-white/70 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-6 py-6 text-center text-sm text-gray-500">
        © 2026 Calculations Application • Built by Bryan Ferro
    </div>
</footer>

<script src="{{ url_for('static', path='js/script.js') }}"></script>

{% block scripts %}{% endblock %}

</body>
</html>
