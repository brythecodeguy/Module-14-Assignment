{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-emerald-50 to-slate-100 flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-xl">
    <div class="bg-white/90 backdrop-blur-sm shadow-xl border border-emerald-100 rounded-2xl p-8 sm:p-10">
      <div class="max-w-md mx-auto">
        <div class="space-y-6 text-gray-700">
          <div class="text-center">
            <h2 class="text-3xl font-bold tracking-tight text-gray-800">Create your account</h2>
            <p class="mt-2 text-sm text-gray-500">
              Set up your account to access your personal calculations dashboard.
            </p>
          </div>

          <div id="registerError" class="hidden bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded-xl text-sm" role="alert"></div>

          <div id="registerSuccess" class="hidden bg-emerald-100 border border-emerald-300 text-emerald-700 px-4 py-3 rounded-xl text-sm" role="alert"></div>

          <form id="registerForm" class="space-y-5">
            <div>
              <label for="registerUsername" class="block text-sm font-medium text-gray-700 mb-1">
                Username
              </label>
              <input
                type="text"
                id="registerUsername"
                name="username"
                required
                placeholder="Choose a username"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
              >
            </div>

            <div>
              <label for="registerEmail" class="block text-sm font-medium text-gray-700 mb-1">
                Email
              </label>
              <input
                type="email"
                id="registerEmail"
                name="email"
                required
                placeholder="Enter your email"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
              >
            </div>

            <div>
              <label for="registerFirstName" class="block text-sm font-medium text-gray-700 mb-1">
                First Name
              </label>
              <input
                type="text"
                id="registerFirstName"
                name="first_name"
                required
                placeholder="Enter your first name"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
              >
            </div>

            <div>
              <label for="registerLastName" class="block text-sm font-medium text-gray-700 mb-1">
                Last Name
              </label>
              <input
                type="text"
                id="registerLastName"
                name="last_name"
                required
                placeholder="Enter your last name"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
              >
            </div>

            <div>
              <label for="registerPassword" class="block text-sm font-medium text-gray-700 mb-1">
                Password
              </label>
              <input
                type="password"
                id="registerPassword"
                name="password"
                required
                placeholder="Create a password"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
              >
            </div>

            <div>
              <label for="registerConfirmPassword" class="block text-sm font-medium text-gray-700 mb-1">
                Confirm Password
              </label>
              <input
                type="password"
                id="registerConfirmPassword"
                name="confirm_password"
                required
                placeholder="Re-enter your password"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
              >
            </div>

            <button
              type="submit"
              class="w-full py-3 px-4 rounded-xl shadow-md text-sm font-semibold text-white bg-emerald-600 hover:bg-emerald-700 transition duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-400"
            >
              Create Account
            </button>
          </form>

          <p class="text-sm text-gray-600 text-center">
            Already have an account?
            <a href="{{ url_for('login_page') }}" class="font-medium text-emerald-700 hover:text-emerald-800 hover:underline">
              Sign in here
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
