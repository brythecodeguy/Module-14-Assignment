{% extends "layout.html" %}
{% block title %}Edit Calculation{% endblock %}

{% block content %}
<div id="editPage" data-id="{{ calculation_id }}" class="min-h-screen bg-gradient-to-br from-emerald-50 to-slate-100 px-4 py-8">
  <div class="max-w-4xl mx-auto space-y-6">

    <div class="bg-white/90 shadow-xl border border-emerald-100 rounded-2xl p-6">
      <a href="/dashboard" class="text-emerald-700 hover:text-emerald-900 font-medium">← Back to Dashboard</a>
      <h2 class="text-3xl font-bold text-gray-800 mt-4">Edit Calculation</h2>
      <p class="text-gray-500 text-sm mt-1">Update the operation or input values</p>
    </div>

    <div id="errorAlert" class="hidden bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded-xl text-sm"></div>
    <div id="successAlert" class="hidden bg-emerald-100 border border-emerald-300 text-emerald-700 px-4 py-3 rounded-xl text-sm"></div>

    <div class="bg-white/90 shadow-xl border border-emerald-100 rounded-2xl p-6">
      <form id="editForm" class="space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <div class="space-y-5">
            <div>
              <label for="type" class="block text-sm font-medium text-gray-700 mb-1">Operation</label>
              <select
                id="type"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
              >
                <option value="addition">Addition</option>
                <option value="subtraction">Subtraction</option>
                <option value="multiplication">Multiplication</option>
                <option value="division">Division</option>
              </select>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label for="a" class="block text-sm font-medium text-gray-700 mb-1">Input A</label>
                <input
                  id="a"
                  type="number"
                  step="any"
                  required
                  class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
                >
              </div>

              <div>
                <label for="b" class="block text-sm font-medium text-gray-700 mb-1">Input B</label>
                <input
                  id="b"
                  type="number"
                  step="any"
                  required
                  class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
                >
              </div>
            </div>
          </div>

          <div class="bg-slate-50 rounded-2xl border border-emerald-100 p-6 flex items-center justify-center">
            <div class="w-full max-w-xs bg-white rounded-2xl shadow-md border border-slate-100 p-6 text-center">
              <p class="text-xs uppercase tracking-wide text-gray-500 font-semibold mb-4">
                Result Preview
              </p>

              <div class="text-2xl font-bold text-gray-800 space-y-3">
                <div>
                  <span id="previewA"></span>
                  <span id="previewOperator" class="text-emerald-600 mx-2"></span>
                  <span id="previewB"></span>
                </div>

                <div class="border-t border-gray-200 pt-4 text-emerald-700 text-3xl">
                  = <span id="previewResult"></span>
                </div>
              </div>
            </div>
          </div>

        </div>

        <div class="flex flex-wrap gap-3 pt-2">
          <a
            href="/dashboard/view/{{ calculation_id }}"
            class="rounded-xl bg-emerald-100 text-emerald-700 px-4 py-2 font-semibold hover:bg-emerald-200"
          >
            ← Back to View
          </a>

          <button
            type="submit"
            class="rounded-xl bg-amber-100 text-amber-700 px-4 py-2 font-semibold hover:bg-amber-200"
          >
            Save Changes
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
{% endblock %}
