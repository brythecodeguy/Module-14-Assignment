{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-emerald-50 to-slate-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="bg-white/90 backdrop-blur-sm shadow-xl border border-emerald-100 rounded-2xl p-8">
      <div class="max-w-md mx-auto">
        <div class="space-y-6 text-gray-700">
          <div class="text-center">
            <h2 class="text-3xl font-bold tracking-tight text-gray-800">Sign in to Calculations</h2>
            <p class="mt-2 text-sm text-gray-500">Access your account and continue working with your calculations.</p>
          </div>

          <div id="loginError" class="hidden bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded-xl text-sm" role="alert"></div>

          <div id="loginSuccess" class="hidden bg-emerald-100 border border-emerald-300 text-emerald-700 px-4 py-3 rounded-xl text-sm" role="alert"></div>

          <form id="loginForm" class="space-y-5">
            <div>
              <label for="loginUsername" class="block text-sm font-medium text-gray-700 mb-1">
                Username or Email
              </label>
              <input
                type="text"
                id="loginUsername"
                name="username"
                required
                placeholder="Enter your username or email"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
              >
            </div>

            <div>
              <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">
                Password
              </label>
              <input
                type="password"
                id="loginPassword"
                name="password"
                required
                placeholder="Enter your password"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none"
              >
            </div>

            <div class="flex items-center justify-between text-sm">
              <div class="flex items-center">
                <input
                  id="remember"
                  name="remember"
                  type="checkbox"
                  class="h-4 w-4 text-emerald-600 focus:ring-emerald-500 border-gray-300 rounded"
                >
                <label for="remember" class="ml-2 block text-gray-700">
                  Remember me
                </label>
              </div>
            </div>

            <div>
              <button
                type="submit"
                class="w-full flex justify-center py-3 px-4 rounded-xl shadow-md text-sm font-semibold text-white bg-emerald-600 hover:bg-emerald-700 transition duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-400"
              >
                Sign In
              </button>
            </div>
          </form>

          <p class="text-sm text-gray-600 text-center">
            Don’t have an account?
            <a href="{{ url_for('register_page') }}" class="font-medium text-emerald-700 hover:text-emerald-800 hover:underline">
              Create one here
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
